name: Employee API CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t employee-api .

      - name: Tag Docker Image
        run: |
          docker tag employee-api:latest ${{ steps.login-ecr.outputs.registry }}/employee-api:latest

      - name: Push Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/employee-api:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 229746429766.dkr.ecr.us-east-1.amazonaws.com

            docker pull 229746429766.dkr.ecr.us-east-1.amazonaws.com/employee-api:latest

            docker stop employee-api || true
            docker rm employee-api || true

            docker run -d \
              --name employee-api \
              -p 5000:5000 \
              229746429766.dkr.ecr.us-east-1.amazonaws.com/employee-api:latest